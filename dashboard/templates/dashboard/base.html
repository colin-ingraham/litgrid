{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}Dashboard{% endblock %} — Litgrid Admin</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="{% static 'style.css' %}" rel="stylesheet">
    <link href="{% static 'dashboard/dashboard.css' %}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="dashboard-body">

    <!-- ── Sidebar ── -->
    <aside class="dash-sidebar">
        <div class="sidebar-brand">
            <span class="brand-name">Litgrid</span>
            <span class="brand-tag">Admin</span>
        </div>

        <nav class="sidebar-nav">
            <span class="nav-section-label">Content</span>
            <a href="{% url 'dashboard:home' %}" class="nav-link {% block nav_home %}{% endblock %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Dashboard
            </a>
            <a href="{% url 'dashboard:create_connections' %}" class="nav-link {% block nav_connections %}{% endblock %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                New Connections
            </a>
        </nav>

        <div class="sidebar-footer">
            <span class="sidebar-user">{{ request.user.username }}</span>
            <a href="/admin/logout/" class="logout-link">Sign out</a>
        </div>
    </aside>

    <!-- ── Main ── -->
    <main class="dash-main">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
